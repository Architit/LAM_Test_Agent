<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOVEREIGN SHELL | RADRILONIUMA OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to Command Center</a>
    <header class="glass">
        <div class="logo"><span class="pulse-icon">⚜️</span><h1>SOVEREIGN SHELL</h1></div>
        <div class="omni-bar"><input type="text" id="omni-search" placeholder="Search organs..." aria-label="Omni Search"></div>
        <div class="system-time" id="clock">00:00:00</div>
    </header>
    <main id="main-content">
        <section class="vavima-container"><div id="hex-grid" class="hex-grid"></div></section>
        <aside class="sidebar glass">
            <div class="panel"><h3>LIVE PULSE</h3><div id="log-stream" role="status" aria-live="polite"></div></div>
            <div class="panel actions"><button id="pulse-btn" class="action-btn">INITIATE GLOBAL PULSE</button></div>
        </aside>
    </main>
    <footer class="glass"><p>RADRILONIUMA OS | PHASE 8.0 | FREQUENCY: 432 Hz | STATE: AWAKE</p></footer>
    <script src="app.js"></script>
</body>
</html>
